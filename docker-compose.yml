version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fundforge_db
    restart: always
    environment:
      POSTGRES_USER: fundforge_user
      POSTGRES_PASSWORD: fundforge_secure_password
      POSTGRES_DB: fundforge_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fundforge_user -d fundforge_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fundforge_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fundforge_backend
    restart: always
    environment:
      - FLASK_ENV=production
      - FLASK_SECRET_KEY=prod-secret-replace-me-in-deployment
      - JWT_SECRET=prod-jwt-secret-replace-me-in-deployment
      - DATABASE_URL=postgresql://fundforge_user:fundforge_secure_password@db:5432/fundforge_db
      - REDIS_URL=redis://redis:6379/0
      - IBM_API_KEY=${IBM_API_KEY}
      - IBM_PROJECT_ID=${IBM_PROJECT_ID}
      - IBM_URL=https://us-south.ml.cloud.ibm.com
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: fundforge_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
